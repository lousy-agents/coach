name: CI

on:
  push:
  pull_request:

env:
  CGO_ENABLED: "1"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          diff <(gofmt -l .) <(printf '')

      - name: go vet
        run: go vet ./...

      - name: go mod tidy (no diff)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go test -race
        run: go test -race ./...

      - name: go test examples
        run: go test -run Example ./...

  js-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Installs go and node from mise.toml [tools], so CI and local builds
      # share one tool-version source of truth.
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: js/semantics build + tests
        run: mise run js-ci

  # Additive, sibling to verify/js-verify (unchanged): proves pkg/semantics
  # actually compiles for GOOS=js GOARCH=wasm via the pure-Go gotreesitter
  # engine, with no CGO and no TinyGo. The CGO path stays the zero-risk
  # default everywhere else; this job doesn't touch it.
  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # jdx/mise-action (not actions/setup-go) so `mise run wasm-build`
      # resolves, keeping the exact build flags (grammar-subset tags,
      # GOOS/GOARCH/CGO_ENABLED) defined once in mise.toml rather than
      # duplicated here.
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: GOOS=js GOARCH=wasm build (pure-Go engine)
        run: mise run wasm-build

  # Additive: runs the dual-backend (CGO vs pure-Go) conformance suite.
  # Requires CGO (inherited from the top-level env) so both engines are
  # compiled in simultaneously.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: dual-backend conformance suite
        run: mise run conformance-test
