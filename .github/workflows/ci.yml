name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          diff <(gofmt -l .) <(printf '')

      - name: go vet
        run: go vet ./...

      - name: go mod tidy (no diff)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go test -race
        run: go test -race ./...

      - name: go test examples
        run: go test -run Example ./...

  js-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Installs go and node from mise.toml [tools], so CI and local builds
      # share one tool-version source of truth.
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: js/semantics build + tests
        run: mise run js-ci

  # Proves pkg/semantics compiles for GOOS=js GOARCH=wasm via the pure-Go
  # gotreesitter engine, with no TinyGo.
  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # jdx/mise-action (not actions/setup-go) so `mise run wasm-build`
      # resolves, keeping the exact build flags (grammar-subset tags,
      # GOOS/GOARCH/CGO_ENABLED) defined once in mise.toml rather than
      # duplicated here.
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: GOOS=js GOARCH=wasm build (pure-Go engine)
        run: mise run wasm-build
