min_version = "2026.7.11"

[settings]
experimental = true

[tools]
go = "1.26.5"
node = "24"

[tasks.gofmt]
description = "Check Go formatting"
run = "gofmt -l ."

[tasks.go-vet]
description = "Run go vet on all packages"
run = "go vet ./..."

[tasks.test]
description = "Run all unit tests with race detection"
run = "go test -race ./..."

[tasks.test-examples]
description = "Run Go example tests"
run = "go test -run Example ./..."

[tasks.acceptance-style-check]
description = "Fail if any *_acceptance_test.go lacks a ginkgo/v2 import (except the explicit allowlist)"
run = "go run ./cmd/acceptance-style-guard"

[tasks.test-acceptance-fast]
description = "Run the fast, in-process Ginkgo/Gomega acceptance suites (public Go/CLI-boundary tests, offline, no real credentials) -- Feature Zero's runnable acceptance layer (see docs/architecture/acceptance-harness.md)"
run = [
  "go run ./cmd/acceptance-guard-preflight",
  { task = "acceptance-style-check" },
  "go test -race ./... -run Acceptance",
]

[tasks.test-queue-conformance]
description = "Run the queue conformance harness's self-test (in-memory reference adapter); selects real Redis Streams / LocalStack SQS conformance legs once Baseline Task 3a's adapters exist (see docs/architecture/acceptance-harness.md)"
run = "go test -race ./internal/acceptanceharness/queueconformance/... -run Acceptance -v"

[tasks.thinproof-build]
description = "Build local Docker images for issue #79's offline thin Compose proof (run once, online, before going offline)"
run = [
  "go mod vendor",
  "docker compose -f deploy/compose/thinproof/docker-compose.yml build",
]

[tasks.test-acceptance-thin-proof]
description = "Run the offline thin Compose proof: fake GitHub -> pkg/githubingest -> CodeSignal, no image pull, no egress (see docs/architecture/acceptance-harness.md section 2)"
run = [
  "go run ./cmd/acceptance-guard-preflight",
  "go run ./cmd/thinproof-preflight",
  "go test -race -tags thinproof ./internal/acceptanceharness/thinproof/... -run Acceptance -v -count=1",
]

[tasks.tidy-check]
description = "Check that go.mod and go.sum are tidy"
run = "go mod tidy && git diff --exit-code go.mod go.sum"

[tasks.backend-build]
description = "Build the Go stdio backend binary consumed by js/semantics"
run = "go build -o js/semantics/bin/coach-semantics-json ./cmd/semantics-json"

[tasks.js-install]
description = "Install js/semantics dev dependencies (scripts skipped; js-build compiles explicitly)"
run = "npm ci --ignore-scripts"
dir = "js/semantics"

[tasks.js-build]
description = "Typecheck and compile the TS package"
run = "npm run build"
dir = "js/semantics"
depends = ["js-install", "backend-build"]

[tasks.js-test]
description = "Run js/semantics tests (fake-backend, CLI lifecycle, and Go/JS parity suites)"
run = [
  "npm run build:test",
  "node --test \"dist-test/**/*.test.js\"",
]
dir = "js/semantics"
depends = ["js-build"]

[tasks.js-ci]
description = "All JS-side verifications"
depends = ["js-test"]

[tasks.wasm-build]
description = "Prove pkg/semantics compiles for GOOS=js GOARCH=wasm via the pure-Go gotreesitter engine (no TinyGo)"
run = "GOOS=js GOARCH=wasm CGO_ENABLED=0 go build -tags 'grammar_subset grammar_subset_go grammar_subset_typescript grammar_subset_tsx' ./pkg/semantics/..."

[tasks.ci]
description = "Run all CI verifications"
run = [
  { task = "gofmt" },
  { task = "go-vet" },
  { task = "tidy-check" },
  { task = "acceptance-style-check" },
  { task = "test" },
  { task = "test-examples" },
  { task = "js-ci" },
]
