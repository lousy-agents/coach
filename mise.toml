min_version = "2026.7.7"

[settings]
experimental = true

[tools]
go = "1.26.5"
node = "24"

[tasks.gofmt]
description = "Check Go formatting"
run = "gofmt -l ."

[tasks.go-vet]
description = "Run go vet on all packages"
run = "go vet ./..."

[tasks.test]
description = "Run all unit tests with race detection"
run = "go test -race ./..."

[tasks.test-examples]
description = "Run Go example tests"
run = "go test -run Example ./..."

[tasks.tidy-check]
description = "Check that go.mod and go.sum are tidy"
run = "go mod tidy && git diff --exit-code go.mod go.sum"

[tasks.backend-build]
description = "Build the Go stdio backend binary consumed by js/semantics"
run = "go build -o js/semantics/bin/coach-semantics-json ./cmd/semantics-json"

[tasks.js-install]
description = "Install js/semantics dev dependencies (scripts skipped; js-build compiles explicitly)"
run = "npm ci --ignore-scripts"
dir = "js/semantics"

[tasks.js-build]
description = "Typecheck and compile the TS package"
run = "npm run build"
dir = "js/semantics"
depends = ["js-install", "backend-build"]

[tasks.js-test]
description = "Run js/semantics tests (fake-backend, CLI lifecycle, and Go/JS parity suites)"
run = [
  "npm run build:test",
  "node --test \"dist-test/**/*.test.js\"",
]
dir = "js/semantics"
depends = ["js-build"]

[tasks.js-ci]
description = "All JS-side verifications"
depends = ["js-test"]

[tasks.wasm-build]
description = "Prove pkg/semantics compiles for GOOS=js GOARCH=wasm via the pure-Go gotreesitter engine (no CGO, no TinyGo)"
run = "GOOS=js GOARCH=wasm CGO_ENABLED=0 go build -tags 'grammar_subset grammar_subset_go grammar_subset_typescript grammar_subset_tsx' ./pkg/semantics/..."

[tasks.conformance-test]
description = "Run the dual-backend conformance suite (CGO go-tree-sitter vs pure-Go gotreesitter) against the grammar subset the wasm build ships"
run = "go test -tags 'grammar_subset grammar_subset_go grammar_subset_typescript grammar_subset_tsx' -run TestBackendConformance -v ./pkg/semantics/..."

[tasks.ci]
description = "Run all CI verifications"
run = [
  { task = "gofmt" },
  { task = "go-vet" },
  { task = "tidy-check" },
  { task = "test" },
  { task = "test-examples" },
  { task = "js-ci" },
]
